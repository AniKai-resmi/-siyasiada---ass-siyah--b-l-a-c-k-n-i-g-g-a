<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>AI Terminal</title>
  <style>
    body { background: black; color: lime; font-family: monospace; padding: 20px; }
    #terminal { border: 1px solid lime; padding: 10px; min-height: 300px; }
    .line { margin: 5px 0; }
    input { background: black; border: none; color: lime; font-family: monospace; width: 90%; outline: none; }
  </style>
</head>
<body>
  <div id="terminal">
    <div class="line">AI@github:~$ Hoşgeldin!</div>
    <div class="line">AI@github:~$ <input id="cmdInput" autofocus></div>
  </div>

  <script>
    const input = document.getElementById("cmdInput");
    const terminal = document.getElementById("terminal");

    input.addEventListener("keydown", async function(event) {
      if (event.key === "Enter") {
        const command = input.value.trim();
        const newLine = document.createElement("div");
        newLine.className = "line";
        newLine.textContent = "AI@github:~$ " + command;
        terminal.insertBefore(newLine, input.parentElement);
        
        // Komut kontrolü
        if (command.startsWith("/search")) {
          const query = command.replace("/search", "").trim();
          const resultLine = document.createElement("div");
          resultLine.className = "line";
          resultLine.textContent = "Arama yapılıyor: " + query;
          terminal.insertBefore(resultLine, input.parentElement);

          // Burada gerçek API çağrısı yapılabilir
          // Örn: fetch("https://api.bing.microsoft.com/v7.0/search?q=" + query, { headers: { "Ocp-Apim-Subscription-Key": "ANAHTARIN" } })
          // Sonucu terminale yazdırabilirsin
        }

        input.value = "";
      }
    });
  </script>
</body>
</html>
