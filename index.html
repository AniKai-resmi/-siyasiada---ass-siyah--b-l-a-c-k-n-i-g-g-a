<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Siyasi Adam Terminali</title>
  <style>
    body { background: black; color: lime; font-family: monospace; padding: 20px; }
    #terminal { border: 1px solid lime; padding: 10px; min-height: 300px; }
    .line { margin: 5px 0; }
    input { background: black; border: none; color: lime; font-family: monospace; width: 90%; outline: none; }
  </style>
</head>
<body>
  <div id="terminal">
    <div class="line">SiyasiAdam@github:~$ Hoşgeldin!</div>
    <div class="line">SiyasiAdam@github:~$ <input id="cmdInput" autofocus></div>
  </div>

  <script>
    const input = document.getElementById("cmdInput");
    const terminal = document.getElementById("terminal");

    input.addEventListener("keydown", async function(event) {
      if (event.key === "Enter") {
        const command = input.value.trim();
        const newLine = document.createElement("div");
        newLine.className = "line";
        newLine.textContent = "SiyasiAdam@github:~$ " + command;
        terminal.insertBefore(newLine, input.parentElement);

        if (command === "") {
          const warn = document.createElement("div");
          warn.className = "line";
          warn.textContent = "⚠️ Uyarı: Komut boş olamaz!";
          terminal.insertBefore(warn, input.parentElement);
        } else if (command === "/selam") {
          const reply = document.createElement("div");
          reply.className = "line";
          reply.textContent = "Merhaba! Ben Siyasi Adam.";
          terminal.insertBefore(reply, input.parentElement);
        } else if (command.startsWith("/ara")) {
          const query = command.replace("/ara", "").trim();
          const reply = document.createElement("div");
          reply.className = "line";
          reply.textContent = "🔎 İnternette arama yapılıyor: " + query;
          terminal.insertBefore(reply, input.parentElement);

          // Burada gerçek API çağrısı yapılabilir (örneğin Bing Search API)
          // fetch("https://api.bing.microsoft.com/v7.0/search?q=" + query, { headers: { "Ocp-Apim-Subscription-Key": "ANAHTARIN" } })
          // Sonuçları terminale yazdırabilirsin
        } else {
          const reply = document.createElement("div");
          reply.className = "line";
          reply.textContent = "❓ Bilinmeyen komut: " + command;
          terminal.insertBefore(reply, input.parentElement);
        }

        input.value = "";
      }
    });
  </script>
</body>
</html>
